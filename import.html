<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Import Students</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Import รายชื่อนักเรียน</h2>

<div class="card">

<p>วางรายชื่อนักเรียน (รูปแบบ: รหัส ชื่อ ห้อง)</p>

<textarea id="data" rows="12" style="width:100%"></textarea>

<br><br>

<button onclick="importStudents()">Import นักเรียน</button>

</div>


<div class="card">

<h3>System Log</h3>

<pre id="log"></pre>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";


function log(msg){

document.getElementById("log").textContent += msg + "\n";

}


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



window.importStudents = async function(){

const text = document.getElementById("data").value.trim();

if(!text){

log("ไม่มีข้อมูล");

return;

}


const lines = text.split("\n");

let count = 0;


for(let line of lines){

const parts = line.trim().split(" ");


if(parts.length < 3){

log("ข้าม: "+line);

continue;

}


const id = parts[0];

const name = parts[1];

const room = parts[2];


await setDoc(doc(db,"students",id),{

studentName : name,
class : room.split("/")[0],
room : room.split("/")[1]

});


log("เพิ่ม "+id+" "+name);

count++;

}


log("Import สำเร็จ "+count+" คน");

}

</script>

</body>
</html>
