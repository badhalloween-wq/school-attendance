<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Check-in</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
collection,
addDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function checkStudent(studentId){

document.getElementById("result").innerHTML="กำลังตรวจสอบ...";

const ref = doc(db,"students",studentId);
const snap = await getDoc(ref);

if(!snap.exists()){
document.getElementById("result").innerHTML="❌ ไม่พบรหัสนักเรียน";
return;
}

const student = snap.data();
const today = new Date().toISOString().slice(0,10);

const q = query(
collection(db,"attendance"),
where("studentId","==",studentId),
where("date","==",today)
);

const check = await getDocs(q);

if(!check.empty){
document.getElementById("result").innerHTML=
"⚠️ เช็คชื่อแล้ววันนี้<br>"+student.studentName;
return;
}

await addDoc(collection(db,"attendance"),{
studentId:studentId,
name:student.studentName,
class:student.class,
room:student.room,
date:today,
time:new Date().toLocaleTimeString()
});

document.getElementById("result").innerHTML=
"✅ เช็คชื่อสำเร็จ<br>"+
student.studentName+" "+student.class+"/"+student.room;

}

window.startScanner=function(){

const scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render((decodedText)=>{
checkStudent(decodedText)
});

}

</script>
</head>
<body style="font-family:sans-serif;text-align:center">
<h2>📚 ระบบเช็คชื่อนักเรียน</h2>
<button onclick="startScanner()" style="font-size:20px;padding:10px">
เริ่มสแกน QR
</button>


</body>
</html>
