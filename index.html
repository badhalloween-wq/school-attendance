<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Check-in</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin:0;
padding:20px;
}

button{

padding:15px;
margin:10px;
font-size:18px;
width:200px;

}

#content{

margin-top:20px;

}

img{

margin:10px;

}

</style>

</head>

<body>

<h1>ระบบเช็คชื่อนักเรียน</h1>

<button onclick="openQR()">สแกน QR</button>
<button onclick="report()">รายงานวันนี้</button>

<div id="content"></div>

<script>

const firebaseConfig = {

apiKey: "PASTE_API_KEY",
authDomain: "PASTE.firebaseapp.com",
projectId: "PASTE",

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function openQR(){

const div = document.getElementById("content");

div.innerHTML = `
<h2>สแกน QR นักเรียน</h2>
<div id="reader" style="width:300px;margin:auto"></div>
`;

const scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{ fps: 10, qrbox: 250 },

(text)=>{

const parts = text.split("|");

const studentId = parts[0];
const studentClass = parts[1];
const name = parts[2];

const today = new Date().toISOString().slice(0,10);

db.collection("attendance").add({

studentId: studentId,
class: studentClass,
name: name,
date: today,
time: new Date()

});

alert("เช็คชื่อแล้ว : " + name);

scanner.stop();

}

);

}

function report(){

const div = document.getElementById("content");

const today = new Date().toISOString().slice(0,10);

db.collection("attendance")
.where("date","==",today)
.get()
.then(snapshot=>{

let html = "<h2>รายชื่อวันนี้</h2>";

snapshot.forEach(doc=>{

const d = doc.data();

html += `<p>${d.studentId} - ${d.name}</p>`;

});

div.innerHTML = html;

});

}

</script>

</body>
</html>
