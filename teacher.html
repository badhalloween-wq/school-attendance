<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Teacher Attendance</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>เช็คชื่อนักเรียน</h2>

<div class="filter-bar">

<label>วันที่</label>
<input type="date" id="dateSelect">

<label>เทอม</label>
<select id="termSelect">
<option value="1">1</option>
<option value="2">2</option>
</select>

<label>ปีการศึกษา</label>
<select id="yearSelect">
<option value="2569">2569</option>
<option value="2570">2570</option>
</select>

</div>


<div class="card">

<h3>รายชื่อนักเรียน</h3>

<div class="dashboard">

<div class="stat">
<span id="totalStudents">0</span>
<p>นักเรียนทั้งหมด</p>
</div>

<div class="stat">
<span id="presentStudents">0</span>
<p>มาเรียน</p>
</div>

<div class="stat">
<span id="absentStudents">0</span>
<p>ยังไม่มา</p>
</div>

</div>

<div id="roomButtons" class="room-filter"></div>

<table>

<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
<th>เช็คชื่อ</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<div class="card">

<h3>System Log</h3>

<pre id="log"></pre>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
addDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";


function log(msg){

console.log(msg);
document.getElementById("log").textContent += msg + "\n";

}


let db;

let currentRoom = "all";
let currentDate = "";
let currentTerm = "1";
let currentYear = "2569";


try{

log("กำลังเชื่อม Firebase...");

const app = initializeApp(firebaseConfig);

db = getFirestore(app);

log("เชื่อม Firebase สำเร็จ");

}catch(e){

log("Firebase Error : "+e);

}



window.markPresent = async function(studentId){

try{

log("เช็คชื่อ "+studentId);

const ref = doc(db,"students",studentId);

const snap = await getDoc(ref);

if(!snap.exists()){

log("ไม่พบข้อมูลนักเรียน");
return;

}

const s = snap.data();

await addDoc(collection(db,"attendance"),{

studentId:studentId,
name:s.studentName,
class:s.class,
room:s.room,

date: currentDate,
term: currentTerm,
year: currentYear,

time:new Date()

});

log("บันทึกการเช็คชื่อสำเร็จ");

loadTable();

}catch(e){

log("Mark Error : "+e);

}

}



window.selectRoom = function(room){

currentRoom = room;

log("เลือกห้อง "+room);

loadTable();

}



function createRoomButtons(students){

let rooms = new Set();

students.forEach(s=>{
rooms.add(s.class + "/" + s.room);
});

const container = document.getElementById("roomButtons");

container.innerHTML="";

container.innerHTML += `<button class="${currentRoom==="all"?"active":""}" onclick="selectRoom('all')">ทั้งหมด</button>`;

rooms.forEach(r=>{

let active = currentRoom===r ? "active" : "";

container.innerHTML += `<button class="${active}" onclick="selectRoom('${r}')">${r}</button>`;

});

}



async function loadTable(){

try{

log("โหลดรายชื่อนักเรียน");

const studentSnap = await getDocs(collection(db,"students"));
const attendanceSnap = await getDocs(collection(db,"attendance"));

let students=[];
let present=[];

studentSnap.forEach(d=>{
students.push({id:d.id,...d.data()});
});

attendanceSnap.forEach(d=>{

let a = d.data();

if(
a.date === currentDate &&
a.term === currentTerm &&
a.year === currentYear
){
present.push(a.studentId);
}

});

students.sort((a,b)=>a.id.localeCompare(b.id));

createRoomButtons(students);

const tbody = document.getElementById("studentTable");

tbody.innerHTML="";


let total = 0;
let presentCount = 0;


students.forEach(s=>{

let roomName = s.class + "/" + s.room;

if(currentRoom !== "all" && roomName !== currentRoom){
return;
}

total++;

let isPresent = present.includes(s.id);

if(isPresent){
presentCount++;
}

let status = isPresent
? '<span class="present">มา</span>'
: '<span class="absent">ยังไม่มา</span>';

let btn = isPresent
? '-'
: `<button onclick="markPresent('${s.id}')">เช็คชื่อ</button>`;

tbody.innerHTML += `

<tr>

<td>${s.id}</td>
<td>${s.studentName}</td>
<td>${roomName}</td>
<td>${status}</td>
<td>${btn}</td>

</tr>

`;

});


document.getElementById("totalStudents").innerText = total;
document.getElementById("presentStudents").innerText = presentCount;
document.getElementById("absentStudents").innerText = total - presentCount;


log("โหลดตารางสำเร็จ");

}catch(e){

log("Load Error : "+e);

}

}



document.getElementById("dateSelect").onchange = function(){

currentDate = this.value;
loadTable();

}

document.getElementById("termSelect").onchange = function(){

currentTerm = this.value;
loadTable();

}

document.getElementById("yearSelect").onchange = function(){

currentYear = this.value;
loadTable();

}



window.onload = function(){

let today = new Date().toISOString().split("T")[0];

document.getElementById("dateSelect").value = today;

currentDate = today;

loadTable();

}

</script>


</body>
</html>
