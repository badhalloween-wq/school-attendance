<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Teacher Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

</head>

<body>

<div class="container">

<h2>ระบบเช็คชื่อ</h2>

<div class="toolbar">

<label>เลือกห้อง</label>

<select id="roomFilter" onchange="renderStudents()">
<option value="3/1" selected>ม.3/1</option>
<option value="3/2">ม.3/2</option>
</select>

</div>

<table>

<thead>

<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

<div class="logbox">
<h3>System Log</h3>
<div id="log"></div>
</div>

</div>

<script>

let students = []

log("กำลังเชื่อม Firebase...")

db.collection("students").onSnapshot((snapshot)=>{

students = []

snapshot.forEach(doc=>{

students.push(doc.data())

})

log("โหลดข้อมูลสำเร็จ")

renderStudents()

},
(err)=>{

log("Firebase Error : "+err)

})

function renderStudents(){

const room = document.getElementById("roomFilter").value

const tbody = document.getElementById("studentTable")

tbody.innerHTML=""

students.forEach(s=>{

if(s.room !== room) return

const tr=document.createElement("tr")

const statusClass = s.status==="มา" ? "present":"absent"

tr.innerHTML=`

<td>${s.id}</td>

<td>${s.name}</td>

<td>${s.room}</td>

<td class="${statusClass}">${s.status}</td>

<td>

<button class="btn-toggle"

onclick="toggleStatus('${s.id}','${s.status}')">

เปลี่ยนสถานะ

</button>

</td>

`

tbody.appendChild(tr)

})

}

function toggleStatus(id,status){

const newStatus = status==="มา" ? "ยังไม่มา":"มา"

db.collection("students")

.doc(id)

.update({

status:newStatus

})

.then(()=>{

log("เปลี่ยนสถานะ "+id+" สำเร็จ")

})

.catch(err=>{

log("Update Error : "+err)

})

}

function log(msg){

const box=document.getElementById("log")

const line=document.createElement("div")

line.innerText=msg

box.appendChild(line)

}

</script>

</body>
</html>
