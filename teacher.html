<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Teacher Check</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.checkStudent = async function(){

const studentId = document.getElementById("studentId").value;

if(!studentId){
alert("กรอกรหัสนักเรียน");
return;
}

const ref = doc(db,"students",studentId);
const snap = await getDoc(ref);

if(!snap.exists()){
alert("ไม่พบรหัสนักเรียน");
return;
}

const s = snap.data();

await addDoc(collection(db,"attendance"),{
studentId: studentId,
name: s.studentName,
class: s.class,
room: s.room,
time: new Date()
});

alert("เช็คชื่อสำเร็จ");

}

</script>

</head>

<body>

<h2>เช็คชื่อ</h2>

<input id="studentId" placeholder="รหัสนักเรียน">

<button onclick="checkStudent()">เช็คชื่อ</button>

</body>
</html>
