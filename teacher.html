
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Check Attendance</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.checkStudent = async function(){

  const studentId = document.getElementById("studentId").value;

  if(!studentId){
    alert("กรอกรหัสนักเรียน");
    return;
  }

  document.getElementById("result").innerHTML="กำลังตรวจสอบ...";

  const studentRef = doc(db,"students",studentId);
  const studentSnap = await getDoc(studentRef);

  if(!studentSnap.exists()){
    document.getElementById("result").innerHTML="❌ ไม่พบรหัสนักเรียน";
    return;
  }

  const student = studentSnap.data();

  await addDoc(collection(db,"attendance"),{
    studentId: studentId,
    name: student.studentName,
    class: student.class,
    room: student.room,
    time: new Date()
  });

  document.getElementById("result").innerHTML=
  "✅ เช็คชื่อสำเร็จ<br>"+student.studentName+" "+student.class+"/"+student.room;

}

</script>

</head>

<body>

<h2>เช็คชื่อแทนนักเรียน</h2>

<input id="studentId" placeholder="กรอกรหัสนักเรียน">
<button onclick="checkStudent()">เช็คชื่อ</button>

<div id="result"></div>

</body>
</html>
