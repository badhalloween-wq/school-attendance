<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Teacher Attendance</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>เช็คชื่อนักเรียน</h2>


<div class="card">

<h3>รายชื่อนักเรียน</h3>

<table>

<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
<th>เช็คชื่อ</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<div class="card">

<h3>System Log</h3>

<pre id="log"></pre>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
addDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";


function log(msg){

console.log(msg);
document.getElementById("log").textContent += msg + "\n";

}


let db;

try{

log("กำลังเชื่อม Firebase...");

const app = initializeApp(firebaseConfig);

db = getFirestore(app);

log("เชื่อม Firebase สำเร็จ");

}catch(e){

log("Firebase Error : "+e);

}



window.checkStudent = async function(){

try{

const input = document.getElementById("studentId");

const studentId = input.value.trim();

if(!studentId){

document.getElementById("msg").innerText="กรอกรหัสนักเรียน";
return;

}

log("ค้นหานักเรียน "+studentId);

const ref = doc(db,"students",studentId);

const snap = await getDoc(ref);


if(!snap.exists()){

log("ไม่พบข้อมูลนักเรียน");

document.getElementById("msg").innerText="ไม่พบรหัส";

return;

}


const s = snap.data();

await addDoc(collection(db,"attendance"),{

studentId:studentId,
name:s.studentName,
class:s.class,
room:s.room,
time:new Date()

});


log("เช็คชื่อสำเร็จ "+s.studentName);

document.getElementById("msg").innerText="เช็คชื่อแล้ว : "+s.studentName;

input.value="";

loadTable();


}catch(e){

log("Check Error : "+e);

}

}



window.markPresent = async function(studentId){

try{

log("เช็คชื่อจากปุ่ม "+studentId);

const ref = doc(db,"students",studentId);

const snap = await getDoc(ref);

if(!snap.exists()){

log("ไม่พบข้อมูล");

return;

}

const s = snap.data();

await addDoc(collection(db,"attendance"),{

studentId:studentId,
name:s.studentName,
class:s.class,
room:s.room,
time:new Date()

});


log("บันทึกการเช็คชื่อสำเร็จ");

loadTable();

}catch(e){

log("Mark Error : "+e);

}

}



async function loadTable(){

try{

log("โหลดรายชื่อนักเรียน");

const studentSnap = await getDocs(collection(db,"students"));

const attendanceSnap = await getDocs(collection(db,"attendance"));


let students=[];

let present=[];


studentSnap.forEach(d=>{

students.push({id:d.id,...d.data()});

});


attendanceSnap.forEach(d=>{

present.push(d.data().studentId);

});


const tbody = document.getElementById("studentTable");

tbody.innerHTML="";


students.forEach(s=>{

let isPresent = present.includes(s.id);


let status = isPresent
? '<span class="present">มา</span>'
: '<span class="absent">ยังไม่มา</span>';


let btn = isPresent
? '-'
: `<button onclick="markPresent('${s.id}')">เช็คชื่อ</button>`;


tbody.innerHTML += `

<tr>

<td>${s.id}</td>
<td>${s.studentName}</td>
<td>${s.class}/${s.room}</td>
<td>${status}</td>
<td>${btn}</td>

</tr>

`;

});


log("โหลดตารางสำเร็จ");


}catch(e){

log("Load Error : "+e);

}

}



document.getElementById("studentId").addEventListener("keypress",function(e){

if(e.key==="Enter"){

checkStudent();

}

});


window.onload = loadTable;

</script>


</body>
</html>
