<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบเช็คชื่อ</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

</head>

<body>

<h2>ระบบเช็คชื่อ</h2>

<div class="controls">
<input id="studentIdInput" placeholder="กรอกรหัสนักเรียน">
<button onclick="checkStudent()">เช็คชื่อ</button>
</div>

<table>
<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

<h3>System Log</h3>
<div id="log"></div>

<script>

const db = firebase.firestore()

const table = document.getElementById("studentTable")
const log = document.getElementById("log")

function writeLog(msg){
log.innerHTML += msg + "<br>"
}

async function loadStudents(){

table.innerHTML=""

writeLog("โหลดรายชื่อนักเรียน...")

try{

const studentsSnapshot = await db.collection("students").get()
const attendanceSnapshot = await db.collection("attendance").get()

let attendanceMap = {}

attendanceSnapshot.forEach(doc=>{
const data = doc.data()
attendanceMap[data.studentId] = true
})

studentsSnapshot.forEach(doc=>{

const data = doc.data()
const studentId = doc.id

const row = document.createElement("tr")

row.innerHTML = `
<td>${studentId}</td>
<td>${data.studentName}</td>
`

table.appendChild(row)

})

writeLog("โหลดเสร็จ "+studentsSnapshot.size+" คน")

}catch(error){

writeLog("ERROR: "+error)

}

}

async function checkStudent(){

const studentId = document.getElementById("studentIdInput").value

if(!studentId){
writeLog("กรุณากรอกรหัสนักเรียน")
return
}

writeLog("เช็คชื่อ "+studentId)

try{

const studentDoc = await db.collection("students").doc(studentId).get()

if(!studentDoc.exists){

writeLog("ไม่พบรหัสนักเรียน")
return

}

const data = studentDoc.data()

await db.collection("attendance").add({

studentId: studentId,
name: data.studentName,
time: firebase.firestore.FieldValue.serverTimestamp()

})

writeLog("เช็คชื่อสำเร็จ "+data.studentName)

document.getElementById("studentIdInput").value=""

}catch(error){

writeLog("ERROR: "+error)

}

}

loadStudents()

</script>

</body>
</html>
