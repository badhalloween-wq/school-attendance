<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>Teacher Attendance</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

</head>

<body>

<h2>ระบบเช็คชื่อ</h2>

เลือกห้อง
<select id="roomSelect">
<option value="3/1">ม.3/1</option>
<option value="3/2">ม.3/2</option>
</select>

<table>

<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<h3>System Log</h3>
<div id="log"></div>

<script>

const db = firebase.firestore()

function log(msg){
document.getElementById("log").innerHTML += "<div>"+msg+"</div>"
}

function todayDate(){
const d = new Date()
return d.toISOString().split('T')[0]
}

async function loadStudents(){

const room = document.getElementById("roomSelect").value
const today = todayDate()

log("กำลังโหลดข้อมูล...")

try{

const studentsSnapshot = await db.collection("students")
.where("room","==",room)
.get()

const attendanceSnapshot = await db.collection("attendance")
.where("date","==",today)
.get()

let attendanceMap = {}

attendanceSnapshot.forEach(doc=>{

const data = doc.data()

attendanceMap[data.studentId] = data.time

})

const table = document.getElementById("studentTable")
table.innerHTML = ""

studentsSnapshot.forEach(doc=>{

const s = doc.data()

let status = attendanceMap[s.id] ? "มา" : "ยังไม่มา"

let time = attendanceMap[s.id] ? attendanceMap[s.id] : "-"

const row = `
<tr>

<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.room}</td>

<td>

${status}
<br>
<small>${time}</small>

</td>

</tr>
`

table.innerHTML += row

})

log("โหลดข้อมูลสำเร็จ")

}catch(err){

log("ERROR : "+err)

}

}

document.getElementById("roomSelect").addEventListener("change",loadStudents)

loadStudents()

</script>

</body>
</html>
