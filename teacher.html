<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบเช็คชื่อ</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
</head>

<body>

<h2>ระบบเช็คชื่อ</h2>

เลือกห้อง

<select id="roomSelect">
<option value="1">ม.3/1</option>
<option value="2">ม.3/2</option>
</select>

<table>
<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<h3>System Log</h3>
<div id="log"></div>

<script>

const db = firebase.firestore()

const table = document.getElementById("studentTable")
const log = document.getElementById("log")
const roomSelect = document.getElementById("roomSelect")

function writeLog(msg){
log.innerHTML += msg + "<br>"
}

async function loadStudents(){

table.innerHTML=""

const room = roomSelect.value

writeLog("โหลดข้อมูลห้อง "+room)

const studentsSnapshot = await db.collection("students").get()
const attendanceSnapshot = await db.collection("attendance").get()

writeLog("students:"+studentsSnapshot.size)
writeLog("attendance:"+attendanceSnapshot.size)

let attendanceMap = {}

attendanceSnapshot.forEach(doc=>{

const a = doc.data()

attendanceMap[a.studentId] = a.time

})

studentsSnapshot.forEach(doc=>{

const data = doc.data()
const studentId = doc.id

if(data.room != room) return

let status = "ยังไม่มา"
let time = "-"

if(attendanceMap[studentId]){

status="มา"

const t = attendanceMap[studentId]

if(t.seconds){
time = new Date(t.seconds*1000).toLocaleTimeString()
}

}

const row = document.createElement("tr")

row.innerHTML=`

<td>${studentId}</td>
<td>${data.studentName}</td>
<td>${data.room}</td>
<td>
${status}<br>
<small>${time}</small><br>
<button onclick="checkIn('${studentId}','${data.studentName}','${data.room}')">
เช็คชื่อ
</button>
</td>

`

table.appendChild(row)

})

}

async function checkIn(studentId,name,room){

await db.collection("attendance").add({

studentId:studentId,
name:name,
room:room,
time:firebase.firestore.FieldValue.serverTimestamp()

})

writeLog("เช็คชื่อ "+name)

loadStudents()

}

roomSelect.addEventListener("change",loadStudents)

loadStudents()

</script>

</body>
</html>
