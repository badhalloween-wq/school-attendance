<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>ระบบเช็คชื่อ</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
font-family:sans-serif;
padding:20px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>ระบบเช็คชื่อ</h2>

เลือกห้อง

<select id="roomSelect">

<option value="3/1">ม.3/1</option>
<option value="3/2">ม.3/2</option>
<option value="3/3">ม.3/3</option>

</select>

<table>

<thead>
<tr>

<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>

</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<h3>System Log</h3>

<div id="log"></div>

<script>

const db = firebase.firestore()

function log(text){

document.getElementById("log").innerHTML += "<div>"+text+"</div>"

}

function today(){

const d = new Date()

return d.toISOString().split("T")[0]

}

async function loadStudents(){

const room = document.getElementById("roomSelect").value
const date = today()

log("กำลังโหลดนักเรียน ห้อง "+room)

try{

const studentsSnapshot = await db.collection("students").get()

log("โหลด students แล้ว")

const attendanceSnapshot = await db.collection("attendance")
.where("date","==",date)
.get()

log("โหลด attendance แล้ว")

let attendanceMap = {}

attendanceSnapshot.forEach(doc=>{

const a = doc.data()

attendanceMap[a.studentId] = a.time

})

const table = document.getElementById("studentTable")

table.innerHTML=""

studentsSnapshot.forEach(doc=>{

const s = doc.data()

if(s.room != room) return

let status = "ยังไม่มา"
let time = "-"

if(attendanceMap[s.id]){

status="มา"
time=attendanceMap[s.id]

}

const row = `

<tr>

<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.room}</td>

<td>

${status}
<br>
<small>${time}</small>

</td>

</tr>

`

table.innerHTML+=row

})

log("โหลดตารางสำเร็จ")

}catch(err){

log("ERROR : "+err)

}

}

document.getElementById("roomSelect").addEventListener("change",loadStudents)

loadStudents()

</script>

</body>

</html>
