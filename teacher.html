<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Teacher Check Attendance</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

</head>

<body>

<h2>ระบบเช็คชื่อ</h2>

<select id="roomSelect">
<option value="3/1">ม.3/1</option>
<option value="3/2">ม.3/2</option>
</select>

<table>
<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>ห้อง</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<h3>System Log</h3>
<div id="log"></div>

<script>

const db = firebase.firestore()

function log(msg){
document.getElementById("log").innerHTML += "<div>"+msg+"</div>"
}

function todayDate(){
const d = new Date()
return d.toISOString().split('T')[0]
}

async function loadStudents(){

const room = document.getElementById("roomSelect").value
const today = todayDate()

log("กำลังโหลดนักเรียน...")

try{

const studentsSnapshot = await db.collection("students")
.where("room","==",room)
.get()

const attendanceSnapshot = await db.collection("attendance")
.where("date","==",today)
.get()

let attendanceMap = {}

attendanceSnapshot.forEach(doc=>{
const data = doc.data()
attendanceMap[data.studentId] = data.status
})

const table = document.getElementById("studentTable")
table.innerHTML = ""

studentsSnapshot.forEach(doc=>{

const s = doc.data()

let status = attendanceMap[s.id] || "ยังไม่มา"

const row = `
<tr>

<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.room}</td>

<td id="status-${s.id}">
${status}
</td>

<td>

<button onclick="updateStatus('${s.id}','มา')">มา</button>
<button onclick="updateStatus('${s.id}','ขาด')">ขาด</button>
<button onclick="updateStatus('${s.id}','สาย')">สาย</button>

</td>

</tr>
`

table.innerHTML += row

})

log("โหลดข้อมูลสำเร็จ")

}catch(err){

log("ERROR : "+err)

}

}

async function updateStatus(studentId,status){

const today = todayDate()

const docId = today+"_"+studentId

try{

await db.collection("attendance").doc(docId).set({

studentId: studentId,
date: today,
status: status

})

document.getElementById("status-"+studentId).innerText = status

log("อัปเดต "+studentId+" เป็น "+status)

}catch(err){

log("ERROR update : "+err)

}

}

document.getElementById("roomSelect").addEventListener("change",loadStudents)

loadStudents()

</script>

</body>
</html>
